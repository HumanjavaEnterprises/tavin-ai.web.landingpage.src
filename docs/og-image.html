<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }
  body {
    background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px;
  }
  .top-row {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 24px;
  }
  .dot {
    width: 18px;
    height: 18px;
    background: #22c55e;
    border-radius: 50%;
  }
  .name {
    font-size: 64px;
    font-weight: 700;
    color: #f8fafc;
    letter-spacing: -0.02em;
  }
  .tagline {
    font-size: 30px;
    color: #94a3b8;
    margin-bottom: 32px;
    text-align: center;
  }
  .features {
    font-size: 20px;
    color: #64748b;
    margin-bottom: 40px;
    text-align: center;
    letter-spacing: 0.01em;
  }
  .pill {
    background: #2563eb;
    color: #ffffff;
    font-size: 20px;
    font-weight: 600;
    padding: 16px 40px;
    border-radius: 12px;
    margin-bottom: 40px;
  }
  .footer {
    font-size: 16px;
    color: #475569;
  }
</style>
</head>
<body>
  <div class="top-row">
    <div class="dot"></div>
    <div class="name">Tavin</div>
  </div>
  <div class="tagline">AI Voice Agent for Appointment Businesses</div>
  <div class="features">Confirms appointments &nbsp;&middot;&nbsp; Fills cancellations &nbsp;&middot;&nbsp; Bilingual EN/FR</div>
  <div class="pill">Private. Task-driven. Fast.</div>
  <div class="footer">tavin.ai &nbsp;&middot;&nbsp; Powered by VoxRelay &nbsp;&middot;&nbsp; Humanjava Enterprises</div>
</body>
</html>
