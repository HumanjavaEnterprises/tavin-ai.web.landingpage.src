<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tavin AI</title>
  <meta name="description" content="Tavin AI">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --text: #f8fafc;
      --muted: #94a3b8;
      --accent: #38bdf8;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .container {
      max-width: 640px;
      text-align: center;
    }

    h1 {
      font-size: 3rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 1rem;
    }

    .accent { color: var(--accent); }

    p {
      font-size: 1.25rem;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    footer {
      position: fixed;
      bottom: 2rem;
      color: var(--muted);
      font-size: 0.875rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1><span class="accent">Tavin AI</span></h1>
    <p>Coming soon.</p>
  </div>
  <footer>&copy; 2026 Tavin AI</footer>
</body>
</html>
